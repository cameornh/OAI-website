name: Build and Deploy

on:
  push:
    branches: ["main"]
  # This allows Builder.io to trigger a build via webhook
  repository_dispatch:
    types: ["*"]
  # This allows you to manually trigger a build from the Actions tab
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

# This ensures only one build runs at a time. 
# If you push twice, it cancels the first one to save time.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm install --engine-strict=false

      - name: Build Next.js
        # We inject the Secret here so Next.js can see it during the build
        env:
          NEXT_PUBLIC_BUILDER_API_KEY: ${{ secrets.NEXT_PUBLIC_BUILDER_API_KEY }}
          PLASMIC_PROJECT_ID: ${{ secrets.PLASMIC_PROJECT_ID }}
          PLASMIC_PROJECT_API_TOKEN: ${{ secrets.PLASMIC_PROJECT_API_TOKEN }}
          # If you have a basePath in next.config.ts, Next.js needs to know it's production
          NODE_ENV: production 
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4