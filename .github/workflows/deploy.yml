name: Deploy Next.js to Pages

on:
  push:
    branches: ["main"]
  # This will trigger on ANY repository dispatch, 
  # even if Builder doesn't send the "event_type" correctly.
  repository_dispatch:
    types: ["*"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22" # <--- ENSURE THIS IS 22
          cache: 'npm'

      - name: Install dependencies
        # The --engine-strict=false flag helps if the environment is picky
        run: npm install --engine-strict=false

      - name: Build Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4